<div class="login-wrapper">
  <mat-card>
    <h2>Login</h2>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email">
      </mat-form-field>
      <small *ngIf="form.controls.email.invalid && form.controls.email.touched">Valid email required</small>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput [type]="hide ? 'password' : 'text'" formControlName="password">
        <button mat-icon-button matSuffix type="button" (click)="hide = !hide">
          <mat-icon>{{ hide ? 'visibility' : 'visibility_off' }}</mat-icon>
        </button>
      </mat-form-field>
      <small *ngIf="form.controls.password.invalid && form.controls.password.touched">Min length 6</small>

      <button mat-raised-button color="primary" [disabled]="loading || form.invalid" class="full-width">
        <span *ngIf="!loading">Login</span>
        <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
      </button>
    </form>
  </mat-card>
</div>
