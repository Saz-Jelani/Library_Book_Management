<div class="page-wrap">
  <h2>Books</h2>

  <div class="toolbar-row">
    <button mat-raised-button color="primary" routerLink="/books/new">Add Book</button>
    <button mat-stroked-button (click)="exportCsv()">Export CSV</button>
    <mat-form-field class="bulk-input">
      <mat-label>Add copies</mat-label>
      <input matInput type="number" min="1" [(ngModel)]="bulkAmount">
    </mat-form-field>
    <button mat-raised-button color="accent" (click)="bulkAddCopies()">Bulk Add Copies</button>
    <mat-form-field>
      <input matInput placeholder="Search" [(ngModel)]="q" (ngModelChange)="apply()">
    </mat-form-field>
  </div>

  <table mat-table [dataSource]="filtered">
    <ng-container matColumnDef="select">
      <th mat-header-cell *matHeaderCellDef>
        <mat-checkbox [checked]="isAllVisibleSelected()" (change)="toggleAllVisible($event.checked)"></mat-checkbox>
      </th>
      <td mat-cell *matCellDef="let b">
        <mat-checkbox [checked]="selectedIds.has(b.id)" (change)="toggleOne(b.id, $event.checked)"></mat-checkbox>
      </td>
    </ng-container>

    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef>Title</th>
      <td mat-cell *matCellDef="let b">{{ b.title }}</td>
    </ng-container>

    <ng-container matColumnDef="author">
      <th mat-header-cell *matHeaderCellDef>Author</th>
      <td mat-cell *matCellDef="let b">{{ b.author }}</td>
    </ng-container>

    <ng-container matColumnDef="avail">
      <th mat-header-cell *matHeaderCellDef>Available</th>
      <td mat-cell *matCellDef="let b">
        <span>{{ b.availableCopies }}</span>
        <span *ngIf="b.availableCopies <= 1" class="low-stock-badge">Low stock</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let b">
        <button mat-button (click)="router.navigate(['/catalog'])">View</button>
        <button mat-button (click)="router.navigate(['/books', b.id, 'edit'])">Edit</button>
        <button mat-button (click)="issue(b.id)">Issue</button>
        <button mat-button color="warn" (click)="del(b.id)">Delete</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="cols"></tr>
    <tr mat-row *matRowDef="let row; columns: cols" [class.low-stock-row]="row.availableCopies <= 1"></tr>
  </table>
</div>
