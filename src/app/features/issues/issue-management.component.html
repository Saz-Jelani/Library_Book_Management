<div class="issues-page">
  <h2>Issue Management</h2>

  <mat-tab-group>
    <mat-tab label="Active Issues">
      <table mat-table [dataSource]="active">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let i">{{ i.id }}</td>
        </ng-container>

        <ng-container matColumnDef="member">
          <th mat-header-cell *matHeaderCellDef>Member</th>
          <td mat-cell *matCellDef="let i">{{ i.memberId }}</td>
        </ng-container>

        <ng-container matColumnDef="due">
          <th mat-header-cell *matHeaderCellDef>Due</th>
          <td mat-cell *matCellDef="let i">{{ i.dueDate | date }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let i">
            <button mat-button (click)="renew(i.id)" [disabled]="i.renewalCount >= 2">Renew</button>
            <button mat-button color="primary" (click)="ret(i.id)">Return</button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="cols"></tr>
        <tr mat-row *matRowDef="let row; columns: cols"></tr>
      </table>
    </mat-tab>

    <mat-tab label="Overdue">
      <table mat-table [dataSource]="overdue">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let i">{{ i.id }}</td>
        </ng-container>

        <ng-container matColumnDef="fine">
          <th mat-header-cell *matHeaderCellDef>Fine</th>
          <td mat-cell *matCellDef="let i" class="fine-amount">{{ i.fineAmount }} BDT</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="overCols"></tr>
        <tr mat-row *matRowDef="let row; columns: overCols"></tr>
      </table>
    </mat-tab>

    <mat-tab label="Issue History">
      <table mat-table [dataSource]="all">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let i">{{ i.id }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let i">{{ i.status }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="histCols"></tr>
        <tr mat-row *matRowDef="let row; columns: histCols"></tr>
      </table>
    </mat-tab>
  </mat-tab-group>
</div>
