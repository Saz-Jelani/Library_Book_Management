<section class="dash">
  <h2>Dashboard</h2>
  <div class="cards">
    <article class="stat-card">
      <h3>{{ totalBooks }}</h3>
      <p>Total Books</p>
    </article>
    <article class="stat-card">
      <h3>{{ members }}</h3>
      <p>Total Members</p>
    </article>
    <article class="stat-card">
      <h3>{{ active }}</h3>
      <p>Active Issues</p>
    </article>
    <article class="stat-card">
      <h3>{{ overdue }}</h3>
      <p>Overdue</p>
    </article>
  </div>
</section>
