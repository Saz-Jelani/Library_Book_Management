<h2 mat-dialog-title>Issue Book</h2>
<div mat-dialog-content>
  <p><strong>{{data.book.title}}</strong> ({{data.book.id}})</p>
  <p [style.color]="currentAvailableCopies > 0 ? 'green' : 'red'">
    {{currentAvailableCopies > 0 ? ('Available: ' + currentAvailableCopies) : 'Unavailable'}}
  </p>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Member</mat-label>
    <input matInput placeholder="Type name or ID" [(ngModel)]="query" [matAutocomplete]="memberAuto">
    <mat-autocomplete #memberAuto="matAutocomplete" (optionSelected)="onMemberSelected($event)">
      <mat-option *ngFor="let m of filteredMembers" [value]="m.id + ' - ' + m.name">
        {{m.id}} - {{m.name}}
      </mat-option>
    </mat-autocomplete>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Due Date</mat-label>
    <input matInput [matDatepicker]="picker" [(ngModel)]="dueDate">
    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>
  </mat-form-field>

  <small *ngIf="limitWarning" class="warning-text">This member already has 3 active issues.</small>
</div>
<div mat-dialog-actions align="end">
  <button mat-button (click)="close()">Cancel</button>
  <button mat-raised-button color="primary" (click)="confirm()" [disabled]="!canIssue">Confirm Issue</button>
</div>
